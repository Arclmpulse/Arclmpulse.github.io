<script>
    function toggleAvatarOverlay() {
      const overlay = document.getElementById('avatar-overlay');
      overlay.classList.toggle('active');
    }
  
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        const overlay = document.getElementById('avatar-overlay');
        if (overlay.classList.contains('active')) {
          toggleAvatarOverlay();
        }
      }
    });
  </script>

  <script>
    // Function to open the modal
    function openModal() {
      document.getElementById('resumeModal').style.display = 'block';
      document.body.style.overflow = 'hidden'; /* Disable body scrolling */
      document.documentElement.style.overflow = 'hidden'; /* Disable HTML scrolling */
  
      // Add click event listener to close modal when clicking outside the image
      window.addEventListener('click', closeModalOutside);
    }
  
    // Function to close the modal
    function closeModal() {
      document.getElementById('resumeModal').style.display = 'none';
      document.body.style.overflow = ''; /* Enable body scrolling */
      document.documentElement.style.overflow = ''; /* Enable HTML scrolling */
  
      // Remove the click event listener when closing the modal
      window.removeEventListener('click', closeModalOutside);
    }
  
    // Function to close the modal when clicking outside the image
    function closeModalOutside(event) {
      var modal = document.getElementById('resumeModal');
      if (event.target === modal) {
        closeModal();
      }
    }
  </script>

  <script>
    function adjustCaptionSize(image) {
        var imageWidth = image.width;
        var caption = image.closest('.lb-outerContainer').querySelector('.lb-caption');
        caption.style.maxWidth = imageWidth + 'px';
    }
</script>
